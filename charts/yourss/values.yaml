# Default values for yourss.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

yourss:
  image:
    repository: ghcr.io/essembeh/yourss
    # tag: main
    pullPolicy: IfNotPresent
  timezone: Europe/Paris
  logLevel: INFO
  cleanTitles: true
  theme: light
  # open actions can be: openModal, openTab or openEmbedded
  openPrimary: openModal
  openSecondary: openTab
  # Space-separated list of language codes to enable the language selector widget
  # Example: customLang: "FR EN ES"
  customLang: ""
  # Keep the last successful RSS response on disk (/tmp/yourss-cache) to survive
  # Youtube's daily transient 404 windows. Feeds are always fetched live; this
  # is only a fallback served on a 404, not a performance cache.
  cacheEnabled: false
  defaultChannels:
    - "@jonnygiger"
  users:
    []
    # - name: alice
    #   # password is optional
    #   password:
    #     # supported methods are
    #     #  argon2: example here https://gchq.github.io/CyberChef/#recipe=Argon2(%7B'option':'UTF8','string':'yourss%20secret%20salt'%7D,3,4096,1,32,'Argon2i','Encoded%20hash')&input=TXkgc2VjdXJlIHBhc3N3b3Jk
    #     #  clear: password are store in plain text
    #     method: argon2
    #     value: "$argon2i$v=19$m=4096,t=3,p=1$c29tZXNhbHQ$y+awVl4ev1h6eG8IbOrPAAjANRIbraM51FL50Pcf/B8"
    #   # override default app theme, supported values are 'light' and 'dark'
    #   theme: light
    #   channels:
    #     # channels can be
    #     #  a channel_id (starting with UC) like UCVooVnzQxPSTXTMzSi1s6uw
    #     #  a user (starting with @) like @jonnygiger
    #     - "@jonnygiger"
    #     - "@berrics"
    # - name: bob
    #   theme: dark
    #   password:
    #     method: clear
    #     value: "bar"
    #   channels:
    #     - "@jonnygiger"
    #     - "@berrics"
    # - name: demo
    #   channels:
    #     - "@jonnygiger"
    #     - "@berrics"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # requests.cpu is required for autoscaling.enabled to work: the HPA computes
  # CPU utilization as a percentage of the request. Without it the HPA cannot
  # scale. YouRSS is I/O-bound (mostly waiting on Youtube), so requests are low.
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    # no cpu limit on purpose (avoid throttling a bursty I/O-bound app)
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
